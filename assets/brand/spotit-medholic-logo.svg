    <path d="M724 310c17 19 46 19 63 0" fill="none" stroke="#14395f" stroke-width="10" stroke-linecap="round"/>
    <path d="M752 384v56M724 412h56" stroke="#0072ce" stroke-width="18" stroke-linecap="round"/>
