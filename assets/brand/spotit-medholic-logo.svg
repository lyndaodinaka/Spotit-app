<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Medholic logo for Spotit wound app</title>
  <desc id="desc">A clean healthcare logo with two friendly smiling leg wound characters above Medholic text, warm orange-red Med, blue holic, yellow excitement marks, and orange swoosh underline.</desc>
  <defs>
    <linearGradient id="medGradient" x1="285" y1="590" x2="630" y2="760" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff9b36"/>
      <stop offset="0.55" stop-color="#f15a24"/>
      <stop offset="1" stop-color="#c9271e"/>
    </linearGradient>
    <linearGradient id="holicGradient" x1="640" y1="590" x2="1110" y2="760" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1ca7ec"/>
      <stop offset="0.55" stop-color="#0072ce"/>
      <stop offset="1" stop-color="#003f7d"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#08324f" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1400" height="900" fill="none"/>

  <g filter="url(#softShadow)">
