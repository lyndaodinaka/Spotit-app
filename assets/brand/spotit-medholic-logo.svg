    <path d="M548 384v56M520 412h56" stroke="#f15a24" stroke-width="18" stroke-linecap="round"/>

    <path d="M788 138c45 40 72 92 70 149l-5 132c-2 52-43 93-94 93h-25c-45 0-82-36-82-81V277c0-52 26-103 69-139 19-16 48-16 67 0Z" fill="#2c8fd8" stroke="#005eb8" stroke-width="14" stroke-linejoin="round"/>
