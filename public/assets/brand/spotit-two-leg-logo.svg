<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Spotit wound care logo</title>
  <desc id="desc">A clean professional Spotit wound care logo with a single leg icon, plaster tape, subtle wound and blood detail, and a warm orange and blue Spotit wordmark.</desc>
  <defs>
    <linearGradient id="spotGradient" x1="360" y1="610" x2="760" y2="770" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff9b36"/>
      <stop offset="0.55" stop-color="#f15a24"/>
      <stop offset="1" stop-color="#c9271e"/>
    </linearGradient>
    <linearGradient id="itGradient" x1="770" y1="610" x2="985" y2="770" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1ca7ec"/>
      <stop offset="0.55" stop-color="#0072ce"/>
      <stop offset="1" stop-color="#003f7d"/>
    </linearGradient>
    <linearGradient id="badgeGradient" x1="430" y1="70" x2="970" y2="540" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#eef8ff"/>
      <stop offset="1" stop-color="#cbeeff"/>
    </linearGradient>
    <linearGradient id="skinGradient" x1="620" y1="130" x2="770" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffd6bd"/>
      <stop offset="0.55" stop-color="#f2aa86"/>
      <stop offset="1" stop-color="#df8a67"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#08324f" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="1400" height="900" fill="none"/>

  <g filter="url(#softShadow)">
    <circle cx="700" cy="300" r="238" fill="url(#badgeGradient)"/>
    <circle cx="700" cy="300" r="220" fill="#ffffff" opacity="0.62"/>

    <path d="M658 104c-32 42-46 88-42 139l14 179c5 66 59 118 125 118h62c38 0 69-31 69-69 0-33-24-61-57-67l-83-15-9-153c-4-63-25-108-63-137-5-4-11-2-16 5Z" fill="url(#skinGradient)" stroke="#8a4d3b" stroke-width="12" stroke-linejoin="round"/>
    <path d="M635 413c29 33 70 50 123 50h61c19 0 35 16 35 35 0 18-15 33-33 33h-78c-69 0-125-46-142-112-2-9 27-13 34-6Z" fill="#ffd6bd" stroke="#8a4d3b" stroke-width="12" stroke-linejoin="round"/>

    <path d="M622 262l150 76" stroke="#fff1df" stroke-width="44" stroke-linecap="round"/>
    <path d="M622 262l150 76" stroke="#c58e65" stroke-width="8" stroke-linecap="round" stroke-dasharray="4 18"/>
    <rect x="662" y="274" width="72" height="48" rx="14" transform="rotate(27 698 298)" fill="#fff8ef" stroke="#d3a079" stroke-width="6"/>
    <circle cx="687" cy="294" r="5" fill="#d3a079" opacity="0.62"/>
    <circle cx="707" cy="303" r="5" fill="#d3a079" opacity="0.62"/>

    <path d="M713 340c11-17 36-19 50-4 10 11 10 28-1 39-15 15-40 12-51-4-7-10-6-21 2-31Z" fill="#b42318" stroke="#7b1512" stroke-width="7" stroke-linejoin="round"/>
    <path d="M728 350c6-8 19-9 26-1 5 5 5 14-1 19-8 7-20 6-26-2-4-5-4-10 1-16Z" fill="#ff8a78"/>
    <path d="M748 389c10 21 1 36-10 36s-21-14-9-35l9-18 10 17Z" fill="#c9271e"/>

    <g fill="none" stroke="#0072ce" stroke-width="12" stroke-linecap="round" opacity="0.82">
      <path d="M502 244c32-84 101-143 186-158"/>
      <path d="M910 239c-30-80-94-138-174-154"/>
    </g>
    <g fill="none" stroke="#ffcc33" stroke-width="14" stroke-linecap="round">
      <path d="M530 128l-34-38"/>
      <path d="M865 128l34-38"/>
    </g>
  </g>

  <text x="700" y="720" text-anchor="middle" font-family="Arial Rounded MT Bold, Trebuchet MS, Arial, sans-serif" font-size="205" font-weight="900" letter-spacing="0">
    <tspan fill="url(#spotGradient)">Spot</tspan><tspan fill="url(#itGradient)">it</tspan>
  </text>
  <path d="M460 788c151 49 356 50 480-12" fill="none" stroke="#f15a24" stroke-width="20" stroke-linecap="round"/>
</svg>
